name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CI: true
  TURBO_TELEMETRY_DISABLED: 1

jobs:
  check:
    name: Typecheck, build, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          # Keep in sync with package.json "packageManager"
          bun-version-file: package.json

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bun run typecheck

      - name: Build
        run: bun run build

      - name: Test
        run: bun run test
        env:
          BETTER_AUTH_SECRET: ci-secret-at-least-32-characters-long
          BETTER_AUTH_URL: http://localhost:3000
          PUBLIC_APP_URL: http://localhost:3000
          INTERNAL_API_URL: http://localhost:3001
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/agent_artifacts_test
          GOOGLE_CLIENT_ID: ci-placeholder
          GOOGLE_CLIENT_SECRET: ci-placeholder
          S3_ENDPOINT: http://localhost:9000
          S3_BUCKET: agent-artifacts-test
          S3_REGION: us-east-1
          S3_ACCESS_KEY_ID: minioadmin
          S3_SECRET_ACCESS_KEY: minioadmin
