name: Sync Railway Environment

on:
  workflow_dispatch:

env:
  INFISICAL_PROJECT_ID: ${{ vars.INFISICAL_PROJECT_ID }}
  RAILWAY_PROJECT_ID: ${{ vars.RAILWAY_PROJECT_ID }}
  RAILWAY_ENVIRONMENT_ID: ${{ vars.RAILWAY_ENVIRONMENT_ID }}
  RAILWAY_API_SERVICE_ID: ${{ vars.RAILWAY_API_SERVICE_ID }}
  RAILWAY_WEB_SERVICE_ID: ${{ vars.RAILWAY_WEB_SERVICE_ID }}
  INFISICAL_TOKEN: ${{ secrets.INFISICAL_TOKEN }}
  RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}

jobs:
  sync:
    name: Sync Infisical prod secrets to Railway
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install Infisical CLI
        run: |
          curl -1sLf 'https://dl.cloudsmith.io/public/infisical/infisical-cli/setup.deb.sh' | sudo -E bash
          sudo apt-get update
          sudo apt-get install -y infisical

      - name: Install Railway CLI
        run: bash <(curl -fsSL https://railway.com/install.sh)

      - name: Sync variables
        run: node scripts/sync-infisical-to-railway.mjs
