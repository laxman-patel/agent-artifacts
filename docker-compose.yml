services:
  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    # Not exposed publicly. Reachable only from the web service over the
    # internal docker network at http://api:3001. The web service rewrites
    # /api/* to this host. Better Auth cookies are scoped to PUBLIC_APP_URL
    # so direct API access wouldn't carry a session anyway.
    expose:
      - "3001"
    env_file:
      - .env
    environment:
      NODE_ENV: production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "node", "-e", "fetch('http://localhost:3001/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      INTERNAL_API_URL: http://api:3001
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped
